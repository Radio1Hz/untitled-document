<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Article</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>

  <style>
    body { color: #b1b1b1; background-color: black; font-family: Georgia, serif; max-width: 900px; margin: 40px auto; padding: 0 16px; line-height: 1.65; }
    img { max-width: 100%; height: auto; }
    pre { overflow-x: auto; padding: 12px; background: #f6f8fa; }
    code { font-family: Consolas, monospace; }
  </style>
</head>
<body>
  <main id="content">Loading...</main>

  <script src="https://cdn.jsdelivr.net/npm/markdown-it@14/dist/markdown-it.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/markdown-it-texmath@1/texmath.min.js"></script>

  <script>
    async function renderMarkdown(markdownUrl) {
      if (!window.markdownit) {
        throw new Error("markdown-it failed to load.");
      }
      if (!window.texmath) {
        throw new Error("markdown-it-texmath failed to load.");
      }
      if (!window.katex) {
        throw new Error("KaTeX failed to load.");
      }

      const md = window.markdownit({
        html: false,
        linkify: true,
        typographer: true
      }).use(window.texmath, {
        engine: window.katex,
        delimiters: "dollars",
        katexOptions: { throwOnError: false }
      });

      // Derive a base URL from the markdown file's location so that
      // relative image paths in the .md resolve correctly regardless of
      // where this HTML page lives.
      const mdBase = markdownUrl.startsWith("http")
        ? markdownUrl.substring(0, markdownUrl.lastIndexOf("/") + 1)
        : new URL(markdownUrl, document.baseURI).href.substring(
            0, new URL(markdownUrl, document.baseURI).href.lastIndexOf("/") + 1
          );

      const res = await fetch(markdownUrl);
      if (!res.ok) throw new Error("Failed to load markdown: " + markdownUrl);
      const text = await res.text();

      const container = document.getElementById("content");
      container.innerHTML = md.render(text);

      // Rewrite every relative img src to be relative to the .md file,
      // not to this HTML page.
      container.querySelectorAll("img").forEach(img => {
        const src = img.getAttribute("src");
        if (src && !src.startsWith("http") && !src.startsWith("data:") && !src.startsWith("/")) {
          img.src = mdBase + src;
        }
      });
    }

    renderMarkdown("logistic-map-inverse-cobweb-diagram.md")
      .catch(err => {
        document.getElementById("content").textContent = err.message;
      });
  </script>
</body>
</html>
